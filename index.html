<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Homerun Hero</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <canvas id="game-canvas"></canvas>

  <!-- HUD overlay -->
  <div id="hud">
    <div id="hud-top">
      <div id="hud-title">HOMERUN HERO</div>
      <div id="hud-strikes"></div>
    </div>
    <div id="hud-bottom">
      <span id="hud-hits">HITS: 0</span>
      <span id="hud-hr">HR: 0</span>
      <span id="hud-best">BEST: 0 ft</span>
    </div>
  </div>

  <!-- Pitch tracking overlay (2D strike zone view) -->
  <div id="pitch-tracker">
    <canvas id="pitch-tracker-canvas"></canvas>
  </div>

  <!-- Pitch info flash -->
  <div id="pitch-info"></div>

  <!-- Result overlay -->
  <div id="result-overlay" class="hidden">
    <div id="result-type"></div>
    <div id="result-stats"></div>
  </div>

  <!-- Title screen -->
  <div id="title-screen">
    <h1>HOMERUN HERO</h1>
    <p>Click or tap to swing at pitches!</p>
    <p class="sub">10 strikes and you're out</p>
    <div class="start-btn">TAP TO START</div>
  </div>

  <!-- Game over screen -->
  <div id="game-over" class="hidden">
    <h1>GAME OVER</h1>
    <div id="final-stats"></div>
    <div id="leaderboard"></div>
    <div class="start-btn">TAP TO PLAY AGAIN</div>
  </div>

  <div id="version">v1.1.0</div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
